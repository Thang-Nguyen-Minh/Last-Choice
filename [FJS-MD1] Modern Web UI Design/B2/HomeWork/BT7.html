<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>[Bài tập 7 – Giỏi] Bảng báo cáo tài chính chuẩn trợ năng</title>
    <style>
        table {
            border-collapse: collapse;
            width: 50%;
            margin-top: 20px;
            font-family: Arial, sans-serif;
        }
        th, td {
            border: 1px solid #dddddd;
            text-align: center;
            padding: 12px;
        }
        th {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>
    <h2>Báo cáo tài chính năm</h2>
    <table>
        <caption>
            Báo cáo doanh thu và lợi nhuận các quý trong năm
        </caption>
        <thead>
            <tr>
                <th>Chỉ tiêu</th>
                <th>Quý 1</th>
                <th>Quý 2</th>
                <th>Quý 3</th>
                <th>Quý 4</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <th scope="row">Doanh thu (Tỷ VNĐ)</th>
                <td>500</td>
                <td>650</td>
                <td>700</td>
                <td>850</td>
            </tr>
            <tr>
                <th scope="row">Lợi nhuận (Tỷ VNĐ)</th>
                <td>120</td>
                <td>180</td>
                <td>210</td>
                <td>250</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
