<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>[Bài tập 6 – Khá] Hồ sơ thông tin cá nhân</title>
</head>
<body>
    <h2>Hồ sơ thông tin cá nhân</h2>
    <form action="https://portal.rikkei.edu.vn/">
        <fieldset>
            <legend>Thông tin cá nhân</legend>
            <label for="name">Tên : </label>
            <input type="text" id="name" placeholder="Nhập họ và tên...">
            <br/>
            <br/>
            <label for="ngay">Ngày sinh : </label>
            <input type="date" id="ngay">
        </fieldset>
        <br/>
        <fieldset>
            <legend>Thông tin liên hệ</legend>
            <label for="mail">Email : </label>
            <input type="email" id="mail" placeholder="example@gmail.com">
            <br/>
            <br/>
            <label for="sdt">Số điện thoại : </label>
            <input type="number" id="sdt" placeholder="0912345678">
        </fieldset>
        <br/>
        <label for="note">Ghi chú bổ sung:</label>
        <br/>
        <br/>
        <textarea id="note" placeholder="Nhập ghi chú của bạn tại đây..."
                  rows="5" cols="50"></textarea>
        <br/>
        <br/>
        <button type="submit">Lưu hồ sơ</button>
    </form>
</body>
</html>
