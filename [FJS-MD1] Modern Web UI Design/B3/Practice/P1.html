<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banner Blog Công Nghệ</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }
        .banner {
            width: 100%;
            height: 200px;
            background-color: #2c3e50;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .banner-title {
            color: #ffffff;
            text-align: center;
            text-transform: uppercase;
            font-size: 2.5rem;
            margin: 0;
        }
    </style>

</head>
<body>
<header class="banner">
    <h1 class="banner-title">Xu hướng công nghệ 2026</h1>
</header>

</body>
</html>
