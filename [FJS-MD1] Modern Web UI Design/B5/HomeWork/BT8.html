<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thanh Điều Hướng - TechZone</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      line-height: 1.6;
    }

    .header {
      background-color: #2c3e50;
      color: white;
      padding: 20px 5%;
    }

    .logo {
      float: left;
      font-size: 1.5rem;
      font-weight: bold;
    }

    .nav-menu {
      float: right;
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .nav-menu li {
      display: inline-block;
      margin-left: 20px;
    }

    .nav-menu a {
      color: white;
      text-decoration: none;
      font-size: 0.9rem;
    }
    .clearfix {
      clear: both;
    }
    .content {
      padding: 40px 5%;
    }

    .content h1 {
      color: #333;
    }
  </style>
</head>
<body>

<header class="header">
  <div class="logo">TechZone</div>

  <ul class="nav-menu">
    <li><a href="#">Trang chủ</a></li>
    <li><a href="#">Sản phẩm</a></li>
    <li><a href="#">Liên hệ</a></li>
  </ul>

  <div class="clearfix"></div>
</header>

<main class="content">
  <h1>Chào mừng bạn đến với TechZone!</h1>
  <p>Đây là nội dung trang web không bị tràn lên phần Header phía trên nhờ kỹ thuật clear float.</p>
</main>

</body>
</html>
