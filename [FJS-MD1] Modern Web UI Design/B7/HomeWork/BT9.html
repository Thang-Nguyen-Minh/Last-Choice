<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <script src="https://cdn.tailwindcss.com"></script>
        <title>Dịch vụ đi kèm</title>
    </head>
    <body class="bg-gray-100 p-10">
        <div class="container mx-auto bg-sky-50 p-10 rounded-2xl">
            <h1 class="text-center font-bold mb-10 text-[32px] text-slate-800">Dịch Vụ Đi Kèm</h1>

            <div class="grid grid-cols-1 md:grid-cols-4 gap-6">

                <div class="bg-white rounded-2xl shadow-sm p-6">
                    <div class="w-12 h-12 bg-blue-50 text-blue-600 rounded-xl flex items-center justify-center mb-4">
                        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 640 640"><path d="M341.8 72.6C329.5 61.2 310.5 61.2 298.3 72.6L74.3 280.6C64.7 289.6 61.5 303.5 66.3 315.7C71.1 327.9 82.8 336 96 336L112 336L112 512C112 547.3 140.7 576 176 576L464 576C499.3 576 528 547.3 528 512L528 336L544 336C557.2 336 569 327.9 573.8 315.7C578.6 303.5 575.4 289.5 565.8 280.6L341.8 72.6zM304 384L336 384C362.5 384 384 405.5 384 432L384 528L256 528L256 432C256 405.5 277.5 384 304 384z"/></svg>
                    </div>
                    <h3 class="text-lg font-bold text-slate-800 mb-2">Khách Sạn</h3>
                    <p class="text-gray-500 text-sm leading-relaxed">Hệ thống khách sạn chuẩn quốc tế cao cấp và tiện nghi.</p>
                </div>

                <div class="bg-white rounded-2xl shadow-sm p-6">
                    <div class="w-12 h-12 bg-blue-50 text-blue-600 rounded-xl flex items-center justify-center mb-4">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                    </div>
                    <h3 class="text-lg font-bold text-slate-800 mb-2">Vé Máy Bay</h3>
                    <p class="text-gray-500 text-sm leading-relaxed">Đối tác từ các hãng hàng không hàng đầu thế giới.</p>
                </div>

                <div class="bg-white rounded-2xl shadow-sm p-6">
                    <div class="w-12 h-12 bg-blue-50 text-blue-600 rounded-xl flex items-center justify-center mb-4">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
                    </div>
                    <h3 class="text-lg font-bold text-slate-800 mb-2">Bảo Hiểm</h3>
                    <p class="text-gray-500 text-sm leading-relaxed">Đảm bảo an toàn 100% trong mọi tình huống khẩn cấp.</p>
                </div>

                <div class="bg-white rounded-2xl shadow-sm p-6">
                    <div class="w-12 h-12 bg-blue-50 text-blue-600 rounded-xl flex items-center justify-center mb-4">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                    </div>
                    <h3 class="text-lg font-bold text-slate-800 mb-2">Hướng Dẫn</h3>
                    <p class="text-gray-500 text-sm leading-relaxed">Đội ngũ hướng dẫn viên người bản địa giàu kinh nghiệm.</p>
                </div>

            </div>
        </div>
    </body>
</html>
