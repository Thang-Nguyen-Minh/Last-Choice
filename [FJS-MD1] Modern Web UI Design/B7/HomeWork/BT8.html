<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <title>[Bài tập] Chế Độ Tối Cho Bảng Giá (Dark Mode)</title>
</head>
<body>
    <div id="main-wrapper" class="min-h-screen flex flex-col items-center justify-center bg-gray-100 transition-all duration-300">
        <div class="bg-white p-10 rounded-2xl shadow-2xl text-center w-[350px] transition-all duration-300 dark:bg-slate-800 dark:text-white">
            <h2 class="text-xl font-bold mb-1">Tour Đà Lạt</h2>
            <p class="text-gray-500 mb-6 dark:text-gray-400">3 Ngày 2 Đêm</p>

            <div class="flex items-baseline justify-center gap-1 text-blue-600 font-extrabold mb-6 dark:text-blue-400">
                <span class="text-4xl">2.500.000đ</span>
                <span class="text-sm font-normal text-gray-500 dark:text-gray-400">/khách</span>
            </div>

            <div class="space-y-3 text-sm text-gray-700 mb-8 dark:text-gray-300">
                <p>Khách sạn 4 sao trung tâm</p>
                <p>Xe Limousine đưa đón tận nơi</p>
                <p>Vé tham quan tất cả các điểm</p>
            </div>

            <button class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition-colors shadow-lg shadow-blue-200 dark:shadow-none">
                ĐẶT TOUR NGAY
            </button>
        </div>

        <button id="toggle-btn" class="fixed bottom-8 right-8 bg-gray-800 text-white px-4 py-2 rounded-full text-sm font-medium hover:scale-105 transition-transform dark:bg-gray-200 dark:text-black">
            Đổi Giao Diện
        </button>
    </div>

    <script>
        const btn = document.getElementById('toggle-btn');
        const wrapper = document.getElementById('main-wrapper');

        btn.addEventListener('click', () => {
            // Toggle class 'dark' để kích hoạt các class dark: trong Tailwind
            wrapper.classList.toggle('dark');

            // Thay đổi màu nền của wrapper khi ở chế độ tối
            if(wrapper.classList.contains('dark')) {
                wrapper.classList.replace('bg-gray-100', 'bg-slate-900');
            } else {
                wrapper.classList.replace('bg-slate-900', 'bg-gray-100');
            }
        });
    </script>
</body>
</html>
