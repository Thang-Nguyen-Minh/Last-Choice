<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>[Bài tập] Form Tìm Kiếm Chuyến Đi (Spacing & Sizing)</title>
</head>
<body>
    <div class="container mx-auto bg-gray-100 p-6 rounded-lg">
        <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-lg p-6 border border-gray-100">
            <form class="grid grid-cols-1 md:grid-cols-12 gap-4 items-end">
                <div class="md:col-span-5">
                    <label class="block text-sm font-medium text-gray-700">Điểm đến</label>
                    <input type="text" placeholder="Bạn muốn đi đâu..."
                           class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-500 transition shadow-sm">
                </div>
                <div class="md:col-span-4">
                    <label class="block text-gray-700 font-bold mb-2">Ngày đi</label>
                    <input type="date"
                           class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-500 transition shadow-sm">
                </div>

                <div class="md:col-span-3">
                    <button type="submit"
                            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg transition duration-300 shadow-md">
                        Tìm kiếm
                    </button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
