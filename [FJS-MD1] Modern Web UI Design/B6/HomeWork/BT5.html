<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[Bài tập] Căn Chỉnh Footer (Chân trang)</title>
    <style>
      body {
        background-color: #ebedef;
        font-family: Arial, sans-serif;
        margin: 0;
      }
      footer {
        background-color: #2C3D50;
        color: white;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 20px 20px 20px 20px;
      }
      .contact a{
        font-weight: bold;
        text-decoration: none;
        color: white;
        margin: 20px 20px 20px 20px;
      }
    </style>
  </head>
  <body>
    <footer>
      <div class="copyright">
        <p>@ 2026 Bản quyền thuộc về Bạn</p>
      </div>
      <div class="contact">
        <a href="#">Facebook</a>
        <a href="#">Twitter</a>
        <a href="#">Linkedln</a>
        <a href="#">Instagram</a>
      </div>
    </footer>
  </body>
</html>
