<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh mục Sản phẩm Nổi bật</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f7f9;
            padding-top: 50px;
        }

        .category-container {
            background-color: #ffffff;
            padding: 40px 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .category-title {
            margin-bottom: 30px;
            color: #333;
            font-weight: bold;
        }
        .category-item {
            display: inline-block;
            width: 160px;
            padding: 15px 10px;
            margin: 5px;
            text-decoration: none;
            color: #444;
            border: 2px solid #3498db;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .category-item:hover {
            background-color: #3498db;
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 4px 8px rgba(52, 152, 219, 0.3);
        }
    </style>
</head>
<body>

<div class="category-container">
    <h2 class="category-title">Danh mục Sản phẩm Nổi bật</h2>

    <nav>
        <a href="#" class="category-item">Laptop</a>
        <a href="#" class="category-item">Điện Thoại</a>
        <a href="#" class="category-item">Phụ Kiện Điện Tử</a>
        <a href="#" class="category-item">Máy Tính Bảng (Tablet)</a>
        <a href="#" class="category-item">Đồng Hồ Thông Minh</a>
    </nav>
</div>

</body>
</html>
