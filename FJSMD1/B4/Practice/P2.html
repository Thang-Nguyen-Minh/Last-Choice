<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thẻ Sản Phẩm Đơn Giản</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
      padding: 50px;
    }
    .product-card {
      background-color: #ffffff;
      width: 300px;
      border: 2px solid #3498db;
      border-radius: 8px;
      padding: 20px;
      margin: 0 auto;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    .product-name {
      font-size: 1.2rem;
      font-weight: bold;
      margin-top: 0;
      color: #333;
    }

    .product-desc {
      font-size: 0.9rem;
      color: #666;
      line-height: 1.5;
      margin: 15px 0;
    }

    .product-price {
      color: #e74c3c;
      font-weight: bold;
      font-size: 1.1rem;
      margin: 0;
    }
  </style>
</head>
<body>

<div class="product-card">
  <h3 class="product-name">Điện Thoại Thông Minh X</h3>
  <p class="product-desc">
    Màn hình 6.5 inch, camera sắc nét, pin dung lượng cao phù hợp cho cả ngày dài.
  </p>
  <p class="product-price">Giá: 15.000.000 VNĐ</p>
</div>

</body>
</html>
