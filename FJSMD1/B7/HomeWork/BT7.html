<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <script src="https://cdn.tailwindcss.com"></script>
        <title>[Bài tập] Giao Diện Tương Thích Mobile-First (Responsive)</title>
    </head>
    <body>
        <div class="container mx-auto bg-gray-100 p-6 rounded-lg">

            <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-lg p-6 border border-gray-100">
                <h1 class="font-bold m-4 p-4 text-center text-[40px]">Về chúng tôi</h1>
                <div class="grid grid-cols-1 gap-6 min-[992px]:grid-cols-2 gap-10 items-center">
                    <div class="overflow-hidden rounded-lg shadow-md">
                        <img src="https://m.media-amazon.com/images/I/91kXf4n6PBL._AC_UF1000,1000_QL80_.jpg" alt="Wanderlust" class="w-full h-auto object-cover">
                    </div>
                    <div class="flex flex-col justify-center items-center">
                        <h3 class="text-2xl font-bold text-blue-800">Sứ mệnh của Wanderlust</h3>
                        <p class="text-gray-600 leading-relaxed text-justify">
                            Chúng tôi tin rằng mỗi chuyến đi không chỉ là việc di chuyển từ nơi này đến nơi khác,
                            mà là một hành trình khám phá bản thân và thế giới...
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
