<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>[Bài tập] Thẻ Giá Trị Nổi Bật (Pricing/Highlight Card)</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      margin: 0;
      padding: 20px;
    }

    .pricing-grid {
      display: flex;
      background-color: #fff;
      justify-content: center;
      align-items: center;
      height: 40vh;
    }

    .pricing-card{
      border: 1px solid bisque;
      border-radius: 10px;
      padding: 20px 20px;
      box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.2);
      margin: 30px 30px;
    }
    .pricing-card:nth-child(2){
      align-self: flex-start;
      background-color: #017BFF;
      color: white;
      margin-top: 0px;
    }
    .pricing-card:nth-child(2) p{
      color: white;
    }
    .pricing-card:nth-child(2) .btn-buy{
      background-color: white;
      text-align: center;
      color: #017BFF;
    }
    .pricing-card h3 {
      font-size: 1rem;
      margin-bottom: 10px;
    }

    .pricing-card p {
      color: #777;
      font-size: 0.85rem;
      line-height: 1.4;
    }

    .btn-buy {
      background-color: #2C3E4E;
      color: white;
      padding: 8px 15px;
      text-decoration: none;
      border-radius: 4px;
      font-size: 0.8rem;
      font-weight: bold;
    }
  </style>
</head>
<body>
    <div class="pricing-grid">
      <div class="pricing-card">
        <h3>Cơ bản</h3>
        <h2>Miễn phí</h2>
        <p>1 Dự án</p>
        <p>100MB Lưu trữ</p>
        <p>Hỗ trợ Email</p>
        <a href="#" class="btn-buy">Bắt đầu ngay</a>
      </div>
      <div class="pricing-card">
        <h3>Chuyên nghiệp</h3>
        <h2>99.000đ/th</h2>
        <p>Dự án không giới hạn</p>
        <p>10GB Lưu trữ</p>
        <p>Hỗ trợ 24/7</p>
        <p>Domain Tùy chỉnh</p>
        <a href="#" class="btn-buy">Nâng cấp</a>
      </div>

      <div class="pricing-card">
        <h3>Doanh nghiệp</h3>
        <h2>Liên hệ</h2>
        <p>Gói tùy chọn đầy đủ</p>
        <p>Dung lượng cao nhất</p>
        <p>Tư vấn riêng biệt</p>
        <a href="#" class="btn-buy">Tìm hiểu thêm</a>
      </div>
    </div>
</body>
</html>
