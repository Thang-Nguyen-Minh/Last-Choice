<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>[Bài tập 2 - Cơ bản] Khối Giới Thiệu Bản Thân</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
      padding: 50px;
    }
    .intro {
      display: flex;
      justify-content: center; /* căn giữa ngang */
    }
    .intro-card{
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      background-color: white;
    }
    img{
        width: 150px;
        height: 150px;
        border-radius: 50%;
        object-fit: cover; /* giữ tỷ lệ ảnh, không bị méo */
    }
  </style>
</head>
<body>
    <div class="intro">
      <div class="intro-card">
        <div class="intro-image">
          <img src="../../Image/cannotforgot.jpg" alt="Sẽ quên thôi nhỉ">
        </div>
        <div class="intro-name">
          <h2>Nguyễn Minh Thắng</h2>
        </div>
        <div class="intro-description">
          "Thái độ quyết định trình độ"
        </div>
      </div>

    </div>
</body>
</html>
