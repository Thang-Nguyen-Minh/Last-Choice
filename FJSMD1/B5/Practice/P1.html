<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[Bài tập 1 - Cơ bản] Thanh Điều Hướng (Navigation Bar)</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }
        .banner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #2C3D50;
            color: white;
            padding: 10px 40px;
        }
        .banner a{
            text-decoration: none;
            padding: 10px 20px;
            font-weight: bold;
            color: white;
        }
    </style>
</head>
<body>
    <header class="banner">
        <div class="banner-title">
            <h1>MyPortfolio</h1>
        </div>
        <div class="banner-contact">
            <a href="#">Giới thiệu</a>
            <a href="#">Kỹ năng</a>
            <a href="#">Dự án</a>
            <a href="#">Liên hệ</a>
        </div>
    </header>
</body>
</html>
