<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hero Section - Du lịch</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .hero-section {
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)),
            url('https://doanhnghiepkinhtexanh.vn/uploads/images/blog/NguyenVanTong/2022/01/30/hinh-nen-may-tinh-phong-canh-thien-nhien-full-hd-5-1643546232.jpg') no-repeat;
            height: 450px;
            background-size: cover;
            background-position: center;

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            padding: 20px;
        }

        .hero-title {
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
        }

        .hero-subtitle {
            font-size: 1.2rem;
            max-width: 700px;
            line-height: 1.6;
            opacity: 0.9;
        }
    </style>
</head>
<body>

<section class="hero-section">
    <h1 class="hero-title">Khám Phá Vẻ Đẹp Thiên Nhiên</h1>
    <p class="hero-subtitle">
        Đắm mình vào những cảnh quan hùng vĩ, tận hưởng không khí trong lành và tạo nên những kỷ niệm khó quên tại những điểm đến tuyệt vời nhất.
    </p>
</section>

</body>
</html>
