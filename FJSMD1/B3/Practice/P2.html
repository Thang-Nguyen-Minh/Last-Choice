<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thẻ thông tin Tác giả - Author Card</title>
    <style>
        body {
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: "Helvetica Neue", Arial, sans-serif;
        }

        .author-card {
            background-color: #ffffff;
            width: 400px;
            padding: 30px;
            border: 1px solid #e0e0e0;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }

        .author-name {
            font-size: 2rem;
            font-weight: 900;
            margin-bottom: 8px;
            color: #000000;
        }

        .author-job {
            font-size: 1.2rem;
            font-weight: 600;
            color: #555555;
            margin-bottom: 15px;
        }

        .author-desc {
            font-size: 1rem;
            color: #333333;
            line-height: 1.5;
            margin: 0;
        }
    </style>
</head>
<body>

<div class="author-card">
    <div class="author-name">Vũ Văn A</div>
    <div class="author-job">Lập trình viên Fullstack</div>
    <p class="author-desc">
        Chào mừng bạn đến với blog của mình. Đây là nơi mình chia sẻ những kiến thức về HTML, CSS và các công nghệ lập trình hiện đại để cùng nhau phát triển trong hành trình trở thành lập trình viên chuyên nghiệp.
    </p>
</div>

</body>
</html>
