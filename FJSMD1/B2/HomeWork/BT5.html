<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>[Bài tập 5 - Mức độ: Khá] Biểu mẫu khảo sát dịch vụ</title>
</head>
<body>
    <h2>Khảo sát dịch vụ khách hàng</h2>
    <form action="https://portal.rikkei.edu.vn/">
        <label for="age">Độ tuổi của bạn :</label>
        <input id="age" type="text">
        <br/>
        <br/>
        <fieldset>
            <legend>Giới tính của bạn là gì?</legend>
            <input type="radio" id="male">
            <label for="male">Nam</label>
            <input type="radio" id="gender">
            <label for="gender">Nữ</label>
            <input type="radio" id="differ">
            <label for="differ">Khác</label>
        </fieldset>
        <br/>
        <fieldset>
            <legend>Dịch vụ bạn đang quan tâm (có thể chọn nhiều)?</legend>
            <input type="checkbox" id="web">
            <label for="web">Website</label>
            <input type="checkbox" id="mobile">
            <label for="mobile">Mobile App</label>
            <input type="checkbox" id="marketing">
            <label for="marketing">Marketing</label>
        </fieldset>
        <br/>
        <label for="age">Quốc gia đang sinh sống :</label>
        <select id="age">
            <option value="1">-- Vui lòng chọn --</option>
            <option value="2">Việt Nam</option>
            <option value="3">Nhật Bản</option>
            <option value="4">Hoa Kỳ</option>
        </select>
        <br/>
        <br/>
        <button type="submit">Gửi thông tin</button>
    </form>
</body>
</html>
