<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>[Bài tập 3 - Mức độ: Khá]  Biểu mẫu đăng nhập hệ thống </title>
</head>
<body>
    <h1>Đăng nhập hệ thống</h1>
    <form method="post" enctype="multipart/form-data">
        <label for="login">Tên đăng nhập : </label>
        <input type="text" id="login" placeholder="Nhập tên đăng nhập...">
        <br/>
        <br/>
        <label for="pass">Mật khẩu : </label>
        <input type="text" id="pass" placeholder="Nhập mật khẩu...">
        <br/>
        <br/>
        <button type="submit"> Đăng nhập </button>
        <button type="reset"> Xóa trắng </button>
    </form>
</body>
</html>
