<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
        <style>
            :root {
                --bs-primary: #b01c2e;
                --bs-primary-rgb: 176, 28, 46;
                --bs-dark: #000000;
                --bs-dark-rgb: 0, 0, 0;
                --bs-btn-border-color: var(--bs-dark);
                --rk-red: #b01c2e;
            }
            .btn-primary {
                --bs-btn-bg: var(--bs-primary);
                --bs-btn-border-color: var(--bs-primary);
            }
            .btn-outline-dark {
                --bs-btn-color: var(--bs-dark);
                --bs-btn-border-color: var(--bs-dark);
            }
            .custom-card {
                border: none;
                border-top: 6px solid var(--rk-red);
                border-radius: 15px;
                overflow: hidden;
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
                transition: transform 0.3s ease;
            }
        </style>
        <title>[Bài tập] Đồng Bộ Nhận Diện Thương Hiệu (Brand Guidelines)</title>
    </head>
    <body>
        <div class="container mt-5">
            <div class="card custom-card">
            <div class="row">
                <div class="col-4">
                   <div class="card" style="width: 18rem;">
                       <img
                               src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQTO6z3Fq6UBbq3SYIZPlZJMScS3w3rLqOfVw&s" alt="Ronaldo" class="card-img-top">
                   </div>
                </div>
                <div class="col-8 mt-3">
                    <h2>Tech Talk: Tương Lai Lập Trình AI</h2>
                    <p>Tham gia cùng Rikkei Academy để khám phá những xu hướng công nghệ AI mới nhất và cách ứng dụng vào phát triển phần mềm trong tương lai.</p>
                    <p><strong>Thời gian : </strong>09:00 - 12:00, 25/11/2026</p>
                    <p><strong>Địa điểm : </strong>Cơ sở Rikkei Avademy HN</p>
                    <div class="d-flex gap-2">
                        <button class="btn btn-primary px-4 py-2">Đăng Ký Ngay</button>
                        <button class="btn btn-outline-dark px-4 py-2">Xem Chi Tiết</button>
                    </div>
                </div>
            </div>
            </div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz" crossorigin="anonymous"></script>
    </body>
</html>
